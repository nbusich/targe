# Hand-rolled accelerate loop hyperparameters. Used when `trainer: custom`.
learning_rate: 5e-5
num_epochs: 1
per_device_train_batch_size: 14
gradient_accumulation_steps: 1

# Gumbel-style routing schedule on connector.tau (no-op if connector lacks `tau`)
tau_start: 1.0
tau_end: 0.1

# L1 sparsity ramp on connector.latest_keep_probs.mean()
# (no-op if connector lacks `latest_keep_probs`)
lambda_start: 0.0
lambda_target: 0.05
warmup_steps: 500

log_every: 30

# Optional cap on optimizer steps. null = run all epochs. Dry-run overrides to 1.
max_steps: null
